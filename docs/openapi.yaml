openapi: 3.0.3
info:
  title: RankySwanky Evaluation API
  version: 0.1.0
  description: >-
    This OpenAPI document is derived from the exported evaluation surface in
    rankyswanky.main and the response models in
    rankyswanky.models.retrieval_evaluation_models.

    No controller files, route decorators, or existing HTTP endpoints were
    found in this repository at generation time. The contract below expresses a
    service wrapper around the existing evaluation workflow so the library can
    be consumed over HTTP while preserving the codebase's current request and
    response shapes.
  contact:
    name: RankySwanky
    url: https://github.com/martinmoldrup/RankySwanky
servers:
  - url: https://api.rankyswanky.local
    description: Placeholder production server
  - url: http://localhost:8000
    description: Local development server
tags:
  - name: Evaluations
    description: Evaluate one or more retrieval engines against supplied queries.
x-generation-notes:
  source_files:
    - rankyswanky/main.py
    - rankyswanky/models/retrieval_evaluation_models.py
    - rankyswanky/application/metrics/aggregated_metrics.py
  controller_files_included: []
paths:
  /evaluation-runs: 
    post:
      tags:
        - Evaluations
      operationId: createEvaluationRunCollection
      summary: Evaluate retrieval results for one or more engines.
      description: >-
        Accepts queries and pre-retrieved document results for each engine,
        then returns the same aggregate structures produced by
        SearchEvaluationRunCollection in the Python package.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvaluationRunCollectionRequest'
            examples:
              easyExample:
                summary: Single engine evaluation
                value:
                  test_configuration:
                    embedding_model: text-embedding-3-large
                    distance_function: cosine
                  engines:
                    - engine_name: default
                      queries:
                        - query: What is the capital of France?
                          retrieval_time_ms: 0
                          retrieved_documents:
                            - document_content: France's capital is Paris.
                              rank: 1
                            - document_content: Paris is known for its art, fashion, and culture.
                              rank: 2
                            - document_content: There is a dish called 'French fries' that is popular in many countries.
                              rank: 3
      responses:
        '201':
          description: Evaluation completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchEvaluationRunCollection'
        '400':
          description: The request payload is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: The payload is structurally valid but cannot be evaluated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    CreateEvaluationRunCollectionRequest:
      type: object
      additionalProperties: false
      required:
        - engines
      properties:
        test_configuration:
          $ref: '#/components/schemas/TestConfiguration'
        engines:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/EngineEvaluationInput'
    EngineEvaluationInput:
      type: object
      additionalProperties: false
      required:
        - engine_name
        - queries
      properties:
        engine_name:
          type: string
          minLength: 1
          description: Matches SearchEvaluationRun.engine_name.
        queries:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/QueryEvaluationInput'
    QueryEvaluationInput:
      type: object
      additionalProperties: false
      required:
        - query
        - retrieved_documents
      properties:
        query:
          type: string
          minLength: 1
        retrieval_time_ms:
          type: integer
          minimum: 0
          default: 0
        retrieved_documents:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RetrievedDocumentInput'
    RetrievedDocumentInput:
      type: object
      additionalProperties: false
      required:
        - document_content
        - rank
      properties:
        document_content:
          type: string
          minLength: 1
        rank:
          type: integer
          minimum: 1
        embedding_vector:
          type: array
          description: Optional embedding vector when precomputed by the caller.
          items:
            type: number
            format: float
    TestConfiguration:
      type: object
      additionalProperties: false
      properties:
        embedding_model:
          type: string
          default: text-embedding-3-large
        distance_function:
          type: string
          default: cosine
    SearchEvaluationRunCollection:
      type: object
      additionalProperties: false
      required:
        - runs
      properties:
        runs:
          type: array
          items:
            $ref: '#/components/schemas/SearchEvaluationRun'
    SearchEvaluationRun:
      type: object
      additionalProperties: false
      required:
        - engine_name
        - test_configuration
        - per_query_results
      properties:
        engine_name:
          type: string
        test_configuration:
          $ref: '#/components/schemas/TestConfiguration'
        per_query_results:
          type: array
          items:
            $ref: '#/components/schemas/QueryResults'
        overall_retrieval_metrics:
          $ref: '#/components/schemas/AggregatedRetrievalMetrics'
    QueryResults:
      type: object
      additionalProperties: false
      required:
        - query
        - retrieved_documents
        - retrieval_time_ms
      properties:
        query:
          type: string
        retrieved_documents:
          type: array
          items:
            $ref: '#/components/schemas/RetrievedDocument'
        query_metrics:
          $ref: '#/components/schemas/PerQueryRetrievalMetrics'
        retrieval_time_ms:
          type: integer
          minimum: 0
    RetrievedDocument:
      type: object
      additionalProperties: false
      required:
        - document_content
        - rank
        - embedding_vector
      properties:
        document_content:
          type: string
        rank:
          type: integer
          minimum: 1
        embedding_vector:
          type: array
          items:
            type: number
            format: float
        retrieved_document_metrics:
          $ref: '#/components/schemas/RetrievedDocumentMetrics'
    RetrievedDocumentMetrics:
      type: object
      additionalProperties: false
      required:
        - relevance
        - novelty
      properties:
        relevance:
          type: number
          format: float
          minimum: 0
          maximum: 1
        novelty:
          type: number
          format: float
          minimum: 0
          maximum: 1
    PerQueryRetrievalMetrics:
      type: object
      additionalProperties: false
      required:
        - mean_relevance
        - mean_novelty
        - reciprocal_rank_of_first_relevant_document
      properties:
        mean_relevance:
          type: number
          format: float
        mean_novelty:
          type: number
          format: float
        reciprocal_rank_of_first_relevant_document:
          type: number
          format: float
    AggregatedRetrievalMetrics:
      type: object
      additionalProperties: false
      required:
        - mean_relevance
        - mean_novelty
        - mean_reciprocal_rank
        - metrics_at_k
      properties:
        mean_relevance:
          type: number
          format: float
        mean_novelty:
          type: number
          format: float
        mean_reciprocal_rank:
          type: number
          format: float
        metrics_at_k:
          type: object
          description: Keyed by rank threshold, for example 10.
          additionalProperties:
            $ref: '#/components/schemas/RetrievalMetricsAtK'
    RetrievalMetricsAtK:
      type: object
      additionalProperties: false
      required:
        - precision
        - recall
        - f1_score
        - mean_average_precision
        - normalized_discounted_cumulative_gain
        - normalized_cumulative_gain
      properties:
        precision:
          type: number
          format: float
        recall:
          type: number
          format: float
        f1_score:
          type: number
          format: float
        mean_average_precision:
          type: number
          format: float
        normalized_discounted_cumulative_gain:
          type: number
          format: float
        normalized_cumulative_gain:
          type: number
          format: float
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string